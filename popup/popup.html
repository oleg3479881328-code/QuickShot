<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuickShot</title>
    <style>
      body {
        margin: 0;
        width: 280px;
        padding: 14px;
        font-family: "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 18px;
      }
      p {
        margin: 8px 0;
        font-size: 12px;
        color: #cbd5e1;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        font-weight: 600;
        cursor: pointer;
      }
      #startBtn {
        background: #10b981;
        color: #082f1d;
      }
      .link-row {
        margin-top: 10px;
        display: flex;
        gap: 8px;
      }
      .link-row button {
        background: #1e293b;
        color: #e2e8f0;
        border: 1px solid #334155;
      }
      #status {
        margin-top: 10px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>QuickShot</h1>
    <button id="startBtn">Start area capture</button>
    <p>Shortcut: Ctrl+Shift+S</p>
    <div class="link-row">
      <button id="optionsBtn">Options</button>
      <button id="helpBtn">Help</button>
    </div>
    <p id="status"></p>
    <script type="module" src="popup.js"></script>
  </body>
</html>
